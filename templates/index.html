<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Tempo de Estudo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 2rem;
      color: #a78bfa;
      letter-spacing: 0.04em;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d50;
      border-radius: 12px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #0f0f1a;
      border: 1px solid #3b3b6b;
      border-radius: 8px;
      color: #e0e0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #a78bfa;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    button {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-start {
      background: #7c3aed;
      color: #fff;
    }

    #btn-stop {
      background: #dc2626;
      color: #fff;
    }

    /* Timer */
    .timer-block {
      text-align: center;
      margin-top: 1.5rem;
      display: none;
    }

    .timer-block.visible { display: block; }

    .timer-subject {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 0.3rem;
    }

    .timer-subject span {
      color: #a78bfa;
      font-weight: 600;
    }

    .timer-display {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #c4b5fd;
      font-variant-numeric: tabular-nums;
    }

    /* Message */
    #message {
      min-height: 1.4rem;
      text-align: center;
      font-size: 0.9rem;
      color: #6ee7b7;
      margin-bottom: 1rem;
    }

    #message.error { color: #f87171; }

    /* History */
    .history-title {
      font-size: 0.85rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.8rem;
    }

    #history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    #history-list li {
      background: #0f0f1a;
      border: 1px solid #2d2d50;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.88rem;
    }

    #history-list li .h-subject {
      color: #a78bfa;
      font-weight: 600;
    }

    #history-list li .h-meta {
      color: #9ca3af;
      margin-top: 0.2rem;
      font-size: 0.8rem;
    }

    #history-list li .h-duration {
      color: #6ee7b7;
      font-weight: 600;
    }

    .empty-msg {
      color: #4b5563;
      font-size: 0.88rem;
      text-align: center;
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Calculadora de Estudo</h1>

    <div id="message"></div>

    <div class="card">
      <label for="subject">Assunto</label>
      <input type="text" id="subject" placeholder="Ex: Algoritmos, Python, Matemática..." />

      <div class="btn-row">
        <button id="btn-start">▶ Iniciar</button>
        <button id="btn-stop" disabled>■ Parar</button>
      </div>

      <div class="timer-block" id="timer-block">
        <div class="timer-subject">Estudando: <span id="timer-subject-label"></span></div>
        <div class="timer-display" id="timer-display">00:00:00</div>
      </div>
    </div>

    <div class="card">
      <div class="history-title">Sessões desta execução</div>
      <ul id="history-list">
        <li class="empty-msg">Nenhuma sessão registrada ainda.</li>
      </ul>
    </div>
  </div>

  <script>
    const btnStart = document.getElementById('btn-start');
    const btnStop  = document.getElementById('btn-stop');
    const subjectInput = document.getElementById('subject');
    const timerBlock = document.getElementById('timer-block');
    const timerDisplay = document.getElementById('timer-display');
    const timerSubjectLabel = document.getElementById('timer-subject-label');
    const messageEl = document.getElementById('message');
    const historyList = document.getElementById('history-list');

    let timerInterval = null;
    let elapsedSeconds = 0;
    let active = false;

    function showMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.className = isError ? 'error' : '';
      if (!isError) setTimeout(() => { messageEl.textContent = ''; }, 4000);
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function formatSeconds(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `${pad(h)}:${pad(m)}:${pad(sec)}`;
    }

    function startLocalTimer(startElapsed) {
      elapsedSeconds = startElapsed;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        elapsedSeconds++;
        timerDisplay.textContent = formatSeconds(elapsedSeconds);
      }, 1000);
    }

    function stopLocalTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function setActiveUI(isActive, subject) {
      active = isActive;
      subjectInput.disabled = isActive;
      btnStart.disabled = isActive;
      btnStop.disabled = !isActive;

      if (isActive) {
        timerSubjectLabel.textContent = subject;
        timerBlock.classList.add('visible');
      } else {
        timerBlock.classList.remove('visible');
        timerDisplay.textContent = '00:00:00';
      }
    }

    function addToHistory(data) {
      const empties = historyList.querySelectorAll('.empty-msg');
      empties.forEach(e => e.remove());

      const li = document.createElement('li');
      li.innerHTML = `
        <div class="h-subject">${escapeHtml(data.subject)}</div>
        <div class="h-meta">
          ${data.start_time} → ${data.end_time} &nbsp;|&nbsp;
          Duração: <span class="h-duration">${data.duration}</span>
        </div>
        <div class="h-meta" style="color:#6b7280">💾 ${escapeHtml(data.filename)}</div>
      `;
      historyList.insertBefore(li, historyList.firstChild);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Restore state on page load
    async function restoreStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        if (data.active) {
          subjectInput.value = data.subject;
          setActiveUI(true, data.subject);
          startLocalTimer(data.elapsed_seconds);
          showMessage(`Sessão em andamento: ${data.subject}`);
        }
      } catch (_) {}
    }

    btnStart.addEventListener('click', async () => {
      const subject = subjectInput.value.trim();
      if (!subject) {
        showMessage('Informe o assunto antes de iniciar.', true);
        subjectInput.focus();
        return;
      }
      try {
        const res = await fetch('/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject }),
        });
        const data = await res.json();
        if (!res.ok) { showMessage(data.error, true); return; }
        setActiveUI(true, subject);
        startLocalTimer(0);
        showMessage(`Sessão iniciada para "${subject}"`);
      } catch (e) {
        showMessage('Erro ao conectar com o servidor.', true);
      }
    });

    btnStop.addEventListener('click', async () => {
      try {
        const res = await fetch('/stop', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) { showMessage(data.error, true); return; }
        stopLocalTimer();
        setActiveUI(false, '');
        subjectInput.value = '';
        addToHistory(data);
        showMessage(`✔ Sessão salva! Duração: ${data.duration} — ${data.filename}`);
      } catch (e) {
        showMessage('Erro ao conectar com o servidor.', true);
      }
    });

    restoreStatus();
  </script>
</body>
</html>
