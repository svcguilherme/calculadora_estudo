<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculadora de Estudo</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: rgba(255, 255, 255, 0.78);
            --text: #1d1d1f;
            --text-soft: #6e6e73;
            --line: rgba(29, 29, 31, 0.12);
            --accent: #0071e3;
            --danger: #d70015;
            --ok: #1f8f4e;
            --shadow: 0 22px 44px rgba(0, 0, 0, 0.11);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% -8%, rgba(0, 113, 227, 0.16), transparent 40%),
                radial-gradient(circle at 92% 110%, rgba(0, 113, 227, 0.12), transparent 35%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .app {
            width: min(680px, 100%);
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
            padding: 26px;
            animation: rise 460ms ease-out both;
        }

        .top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.6rem, 3.8vw, 2.2rem);
            letter-spacing: -0.03em;
            font-weight: 700;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--text-soft);
            font-size: 0.96rem;
            max-width: 44ch;
        }

        .status-strip {
            margin-top: 20px;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.66);
        }

        .pill {
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: rgba(110, 110, 115, 0.16);
            color: var(--text-soft);
        }

        .pill.active {
            background: rgba(31, 143, 78, 0.17);
            color: var(--ok);
        }

        #timer {
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.01em;
            font-size: 1.15rem;
        }

        label {
            display: block;
            margin: 18px 0 8px;
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-soft);
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 13px 14px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        input:focus {
            border-color: rgba(0, 113, 227, 0.46);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14);
        }

        .actions {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        button {
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 11px 12px;
            font-size: 0.94rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;
            color: white;
            background: var(--accent);
            box-shadow: inset 0 -10px 18px rgba(0, 0, 0, 0.16);
        }

        button:hover {
            filter: brightness(1.03);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        #btnParar {
            background: var(--danger);
        }

        #btnStatus {
            color: var(--text);
            background: rgba(29, 29, 31, 0.08);
            border-color: rgba(29, 29, 31, 0.14);
            box-shadow: none;
        }

        .feedback {
            margin-top: 14px;
            min-height: 24px;
            font-size: 0.9rem;
            color: var(--text-soft);
        }

        .feedback.error {
            color: var(--danger);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.992);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section>
            <div class="top">
                <div>
            <h1>Controle de Estudo</h1>
            <p class="subtitle">Inicie uma sessao, acompanhe o tempo e salve o resultado em CSV.</p>
                </div>
            </div>

            <div class="status-strip">
                <span id="statusPill" class="pill">Inativo</span>
                <strong id="timer">00:00:00</strong>
            </div>

            <label for="assunto">Assunto</label>
                <input id="assunto" type="text" placeholder="Ex.: Algebra Linear" />

            <div class="actions">
                <button id="btnIniciar">Iniciar</button>
                <button id="btnParar">Parar</button>
                <button id="btnStatus">Atualizar</button>
            </div>

            <div id="feedback" class="feedback">Pronto para iniciar uma sessao.</div>
        </section>
    </main>

    <script>
        const assunto = document.getElementById('assunto');
        const statusPill = document.getElementById('statusPill');
        const timer = document.getElementById('timer');
        const feedback = document.getElementById('feedback');

        function mostrarFeedback(texto, erro) {
            feedback.textContent = texto;
            feedback.classList.toggle('error', Boolean(erro));
        }

        function atualizarStatusVisual(data) {
            if (data && data.active) {
                statusPill.textContent = 'Ativo';
                statusPill.classList.add('active');
                timer.textContent = data.elapsed || '00:00:00';
            } else {
                statusPill.textContent = 'Inativo';
                statusPill.classList.remove('active');
                timer.textContent = '00:00:00';
            }
        }

        async function chamar(url, metodo, body) {
            const options = { method: metodo, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);

            try {
                const resp = await fetch(url, options);
                const data = await resp.json();
                if (!resp.ok) {
                    mostrarFeedback(data.error || 'Ocorreu um erro.', true);
                    return;
                }

                if (url === '/status') {
                    atualizarStatusVisual(data);
                    if (data.active) {
                        mostrarFeedback('Sessao em andamento: ' + (data.subject || 'sem assunto') + '.', false);
                    } else {
                        mostrarFeedback('Nenhuma sessao ativa no momento.', false);
                    }
                }

                if (url === '/start' && resp.ok) {
                    atualizarStatusVisual({ active: true, elapsed: '00:00:00' });
                    mostrarFeedback('Sessao iniciada com sucesso.', false);
                }

                if (url === '/stop' && resp.ok) {
                    atualizarStatusVisual({ active: false });
                    mostrarFeedback('Sessao encerrada e registrada em CSV.', false);
                }
            } catch (err) {
                mostrarFeedback('Falha na comunicacao com o servidor.', true);
            }
        }

        document.getElementById('btnIniciar').addEventListener('click', () => {
            chamar('/start', 'POST', { subject: assunto.value || '' });
        });

        document.getElementById('btnParar').addEventListener('click', () => {
            chamar('/stop', 'POST');
        });

        document.getElementById('btnStatus').addEventListener('click', () => {
            chamar('/status', 'GET');
        });

        chamar('/status', 'GET');
    </script>
</body>
</html>
